{{ define "title" }}404{{ end }}

{{ define "main" }}
<div id="redirect-content"></div>
<script>
  const path = window.location.pathname;
  const packages = {
    'boto3-client-cache': 'https://61418.io/boto3-client-cache',
    'boto3-refresh-session': 'https://61418.io/boto3-refresh-session',
    'elhaz': 'https://61418.io/elhaz'
  };

  let redirectUrl = null;
  for (const [pkg, baseUrl] of Object.entries(packages)) {
    if (path.includes(pkg)) {
      const suffix = path.substring(path.indexOf(pkg) + pkg.length);
      redirectUrl = baseUrl + suffix;
      break;
    }
  }

  const container = document.getElementById('redirect-content');

  if (redirectUrl) {
    container.innerHTML = `
      <div style="text-align: center; padding: 2rem;">
        <h1>This webpage has moved!</h1>
        <p style="margin: 1.5rem 0;">
          <strong>Redirecting to: <a href="${redirectUrl}">${redirectUrl}</a></strong>
        </p>
        <p style="color: #666; font-size: 0.9rem;">If you are not redirected automatically, please click the link above.</p>
      </div>
    `;
    setTimeout(() => window.location.href = redirectUrl, 5000);
  } else {
    container.innerHTML = `
      <h1>404</h1>
      <h2>ʕノ•ᴥ•ʔノ ︵ ┻━┻</h2>
    `;
  }
</script>
{{ end }}
